    <!-- mouth -->
    <path d="M 214 420 C 228 434 250 434 264 420"/>
    <!-- bubbles -->
    <circle cx="900" cy="150" r="30"/>
    <circle cx="950" cy="230" r="22"/>
    <circle cx="880" cy="80" r="18"/>
  </g>
</svg>
