    <path d="M 380 540 C 330 620 336 702 400 718 L 624 718 C 688 702 694 620 644 540 Z"/>
    <!-- bell -->
    <path d="M 512 596 C 544 596 556 622 558 646 L 466 646 C 468 622 480 596 512 596 Z"/>
    <circle cx="512" cy="666" r="16"/>
    <!-- head -->
    <ellipse cx="512" cy="360" rx="240" ry="200"/>
    <!-- spot on the forehead -->
    <ellipse cx="600" cy="238" rx="54" ry="38" transform="rotate(20 600 238)"/>
    <!-- eyes -->
    <circle cx="420" cy="320" r="28"/>
    <circle cx="604" cy="320" r="28"/>
    <!-- muzzle -->
    <ellipse cx="512" cy="470" rx="140" ry="85"/>
    <!-- nostrils -->
    <ellipse cx="470" cy="452" rx="20" ry="26"/>
    <ellipse cx="554" cy="452" rx="20" ry="26"/>
    <!-- smile -->
    <path d="M 466 502 C 490 526 534 526 558 502"/>
