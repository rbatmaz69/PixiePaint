<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768">
  <g fill="none" stroke="#000000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- petals (closed ellipses, radial, just touching the center) -->
    <ellipse cx="607" cy="135.5" rx="70" ry="100" transform="rotate(30 607 135.5)"/>
    <ellipse cx="702" cy="300" rx="70" ry="100" transform="rotate(90 702 300)"/>
    <ellipse cx="607" cy="464.5" rx="70" ry="100" transform="rotate(150 607 464.5)"/>
    <ellipse cx="417" cy="464.5" rx="70" ry="100" transform="rotate(210 417 464.5)"/>
    <ellipse cx="322" cy="300" rx="70" ry="100" transform="rotate(270 322 300)"/>
    <ellipse cx="417" cy="135.5" rx="70" ry="100" transform="rotate(330 417 135.5)"/>
    <!-- flower center -->
    <circle cx="512" cy="300" r="80"/>
    <!-- stem -->
    <rect x="496" y="382" width="32" height="278" rx="14"/>
    <!-- leaves (fully below the lowest petals to keep regions clean) -->
    <ellipse cx="432" cy="630" rx="70" ry="34" transform="rotate(-35 432 630)"/>
    <ellipse cx="594" cy="650" rx="70" ry="34" transform="rotate(35 594 650)"/>
  </g>
</svg>
