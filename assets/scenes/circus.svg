  <path d="M 512 576 L 512 396 C 436 396 404 484 404 576 Z" fill="#FFCA28"/>
  <path d="M 512 576 L 512 452 C 556 452 574 508 574 576 Z" fill="#8D6E63" opacity="0.55"/>
  <path d="M 512 576 L 512 452 C 468 452 450 508 450 576 Z" fill="#8D6E63" opacity="0.55"/>
